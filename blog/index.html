<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Exponent Marketing & AI</title>
  <meta name="description" content="Marketing tips, AI insights, and growth strategies for local businesses from Exponent Marketing & AI.">
  <meta property="og:title" content="Blog — Exponent Marketing & AI">
  <meta property="og:description" content="Marketing tips, AI insights, and growth strategies for local businesses.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://exponentmarketing.com/blog/">
  <link rel="canonical" href="https://exponentmarketing.com/blog/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #4cc1ce;
      --accent-hover: #3aafbc;
      --text: #111827;
      --text-light: #6b7280;
      --bg: #fefefe;
      --bg-dark: #0c1414;
      --card-bg: #ffffff;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    /* Nav */
    .blog-nav {
      background: #ffffff;
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e5e7eb;
    }

    .blog-nav-logo img {
      max-height: 45px;
      width: auto;
      display: block;
    }

    .blog-nav-back {
      color: #0c1414;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .blog-nav-back:hover {
      opacity: 0.7;
    }

    /* Hero */
    .blog-hero {
      background: var(--bg-dark);
      color: #fefefe;
      padding: 64px 20px 72px;
      text-align: center;
    }

    .blog-hero h1 {
      font-size: 44px;
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .blog-hero p {
      font-size: 18px;
      color: #9ca3af;
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Grid */
    .blog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }

    /* Card */
    .blog-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid #e5e7eb;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .blog-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
    }

    .blog-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .blog-card-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .blog-card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .category-pill {
      background: var(--accent);
      color: #0c1414 !important;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-date {
      font-size: 13px;
      color: var(--text-light);
    }

    .blog-card h2 {
      font-size: 20px;
      line-height: 1.4;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .blog-card h2 a {
      color: var(--text);
      text-decoration: none;
    }

    .blog-card h2 a:hover {
      color: var(--accent);
    }

    .blog-card-excerpt {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.6;
      margin-bottom: 20px;
      flex: 1;
    }

    .read-more {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      font-size: 15px;
    }

    .read-more:hover {
      text-decoration: underline;
    }

    /* CTA Button (nuclear specificity for WordPress/inherited overrides) */
    .cta-button, a.cta-button, button.cta-button {
      color: #0c1414 !important;
      background-color: #4cc1ce !important;
      -webkit-text-fill-color: #0c1414 !important;
      text-decoration: none !important;
    }
    .cta-button:hover, a.cta-button:hover {
      background-color: #3aafbc !important;
      color: #0c1414 !important;
      -webkit-text-fill-color: #0c1414 !important;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 48px;
    }

    .pagination button {
      font-family: 'Inter', sans-serif;
      padding: 10px 18px;
      border: 1px solid #e5e7eb;
      background: var(--card-bg);
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
    }

    .pagination button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .pagination button.active {
      background: var(--accent);
      color: #0c1414 !important;
      border-color: var(--accent);
      font-weight: 600;
    }

    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* States */
    .loading-state,
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }

    .loading-state p,
    .empty-state p {
      font-size: 18px;
    }

    .empty-state h2 {
      font-size: 24px;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .blog-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .blog-nav {
        padding: 12px 16px;
      }
      .blog-nav-logo img {
        max-height: 38px;
      }
      .blog-hero { padding: 48px 20px 56px; }
      .blog-hero h1 { font-size: 32px; }
      .blog-hero p { font-size: 16px; }
      .blog-grid { grid-template-columns: 1fr; gap: 24px; }
      .blog-container { padding: 32px 16px 60px; }
    }
  </style>
</head>
<body>

  <nav class="blog-nav">
    <a href="https://exponentmarketing.com" class="blog-nav-logo">
      <img src="https://exponentmarketing.com/wp-content/uploads/2025/02/cropped-New-Exponent-Logo-Transparent.png" alt="Exponent Marketing & AI">
    </a>
    <a href="https://exponentmarketing.com" class="blog-nav-back">Back to exponentmarketing.com</a>
  </nav>

  <header class="blog-hero">
    <h1>Blog</h1>
    <p>Marketing tips, AI insights, and growth strategies for local businesses.</p>
  </header>

  <main class="blog-container">
    <div id="loading" class="loading-state">
      <p>Loading posts...</p>
    </div>
    <div id="empty" class="empty-state" style="display:none;">
      <h2>No posts yet</h2>
      <p>Check back soon — new content is on the way.</p>
    </div>
    <div id="grid" class="blog-grid" style="display:none;"></div>
    <div id="pagination" class="pagination" style="display:none;"></div>
  </main>

  <script>
    (function () {
      var POSTS_PER_PAGE = 12;
      var currentPage = 1;
      var posts = [];

      var grid = document.getElementById('grid');
      var loading = document.getElementById('loading');
      var empty = document.getElementById('empty');
      var pagination = document.getElementById('pagination');

      function formatDate(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      function truncate(str, len) {
        if (!str) return '';
        return str.length > len ? str.substring(0, len) + '...' : str;
      }

      function stripPipe(title) {
        if (!title) return '';
        var idx = title.indexOf('|');
        return idx > -1 ? title.substring(0, idx).trim() : title;
      }

      function getImagePath(post) {
        return '/blog/posts/images/' + post.slug + '.jpg';
      }

      function renderPage(page) {
        currentPage = page;
        var start = (page - 1) * POSTS_PER_PAGE;
        var pagePosts = posts.slice(start, start + POSTS_PER_PAGE);

        grid.innerHTML = pagePosts.map(function (post) {
          var displayTitle = stripPipe(post.title);
          var imgSrc = getImagePath(post);
          return '<article class="blog-card">' +
            '<a href="' + post.url + '"><img src="' + imgSrc + '" alt="' + displayTitle.replace(/"/g, '&quot;') + '" loading="lazy" onerror="this.src=\'/blog/posts/images/default.jpg\'"></a>' +
            '<div class="blog-card-body">' +
              '<div class="blog-card-meta">' +
                (post.category ? '<span class="category-pill">' + post.category + '</span>' : '') +
                '<span class="card-date">' + formatDate(post.date) + '</span>' +
              '</div>' +
              '<h2><a href="' + post.url + '">' + displayTitle + '</a></h2>' +
              '<p class="blog-card-excerpt">' + truncate(post.description, 140) + '</p>' +
              '<a href="' + post.url + '" class="read-more">Read More &rarr;</a>' +
            '</div>' +
          '</article>';
        }).join('');

        renderPagination();
      }

      function renderPagination() {
        var totalPages = Math.ceil(posts.length / POSTS_PER_PAGE);
        if (totalPages <= 1) {
          pagination.style.display = 'none';
          return;
        }
        pagination.style.display = 'flex';
        var html = '<button ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="blogNav(' + (currentPage - 1) + ')">&larr; Prev</button>';
        for (var i = 1; i <= totalPages; i++) {
          html += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="blogNav(' + i + ')">' + i + '</button>';
        }
        html += '<button ' + (currentPage === totalPages ? 'disabled' : '') + ' onclick="blogNav(' + (currentPage + 1) + ')">Next &rarr;</button>';
        pagination.innerHTML = html;
      }

      window.blogNav = function (page) {
        renderPage(page);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      fetch('posts.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          posts = data;
          loading.style.display = 'none';
          if (posts.length === 0) {
            empty.style.display = 'block';
          } else {
            grid.style.display = 'grid';
            renderPage(1);
          }
        })
        .catch(function () {
          loading.style.display = 'none';
          empty.style.display = 'block';
        });
    })();
  </script>

</body>
</html>
